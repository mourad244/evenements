<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#415dff"/>
  <!-- Calendar body -->
  <rect x="6" y="11" width="20" height="15" rx="3" fill="white" fill-opacity="0.15"/>
  <rect x="6" y="11" width="20" height="15" rx="3" stroke="white" stroke-opacity="0.9" stroke-width="1.5"/>
  <!-- Calendar top bar -->
  <rect x="6" y="11" width="20" height="5" rx="3" fill="white" fill-opacity="0.25"/>
  <rect x="6" y="14" width="20" height="2" fill="white" fill-opacity="0.25"/>
  <!-- Hooks -->
  <line x1="11" y1="8" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="8" x2="21" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Dots grid -->
  <circle cx="11" cy="20" r="1.5" fill="white" fill-opacity="0.9"/>
  <circle cx="16" cy="20" r="1.5" fill="white" fill-opacity="0.9"/>
  <circle cx="21" cy="20" r="1.5" fill="#f39a63"/>
</svg>
