services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evenements_s1_m01
    volumes:
      - evenements_pg_data:/var/lib/postgresql
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evenements_s1_m01"]
      interval: 2s
      timeout: 2s
      retries: 30

  identity-access-service:
    build:
      context: .
      dockerfile: services/identity-access-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/evenements_s1_m01
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-6a9f2d7cf6f748c9b8b5a5c1f0c2b7b1}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-9a3f7c2d5b4f48f2b2f99b1d5c8e4a6c}
      DB_AUTO_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4001/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  event-management-service:
    build:
      context: .
      dockerfile: services/event-management-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4002
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/evenements_s1_m01
      DB_AUTO_MIGRATE: "true"
      REGISTRATION_SERVICE_URL: http://registration-service:4003
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4002/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  registration-service:
    build:
      context: .
      dockerfile: services/registration-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4003
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/evenements_s1_m01
      DB_AUTO_MIGRATE: "true"
      EVENT_MANAGEMENT_SERVICE_URL: http://event-management-service:4002
    depends_on:
      postgres:
        condition: service_healthy
      event-management-service:
        condition: service_healthy
    ports:
      - "4003:4003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4003/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      IDENTITY_SERVICE_URL: http://identity-access-service:4001
      EVENT_MANAGEMENT_SERVICE_URL: http://event-management-service:4002
      REGISTRATION_SERVICE_URL: http://registration-service:4003
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-6a9f2d7cf6f748c9b8b5a5c1f0c2b7b1}
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      identity-access-service:
        condition: service_healthy
      event-management-service:
        condition: service_healthy
      registration-service:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  evenements_pg_data:
